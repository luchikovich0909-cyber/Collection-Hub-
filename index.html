    #root{min-height:100vh}
    input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.15);outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#f48a59;cursor:pointer}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    .ns{scrollbar-width:none;-ms-overflow-style:none}
    .ns::-webkit-scrollbar{display:none}

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

    @keyframes fIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fi{animation:fIn .22s ease both}
    button{cursor:pointer;font-family:inherit;border:none;outline:none}
    input,select{font-family:inherit}
    img{display:block}
  </style>

const fmt = n => Number(n).toLocaleString('ru-RU');

function useCD(ts) {
  const [r, setR] = useState(Math.max(0, ts - Date.now()));
  useEffect(() => {
    const t = setInterval(() => setR(Math.max(0, ts - Date.now())), 1000);
    return () => clearInterval(t);
  }, [ts]);
  return { h: Math.floor(r/3600000), m: Math.floor((r%3600000)/60000), s: Math.floor((r%60000)/1000), done: r===0 };
}

function CDot({ ts, compact }) {
  const { h, m, s, done } = useCD(ts);
  if (done) return <span style={{color:'#f87171',fontSize:12,fontWeight:700}}>ЗАВЕРШЁН</span>;
  const u = h===0&&m<10;
  const txt = compact
    ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    : `${h}ч ${String(m).padStart(2,'0')}м ${String(s).padStart(2,'0')}с`;
  return <span className={u?'pulse':''} style={{fontFamily:'monospace',fontSize:12,fontWeight:700,color:u?'#f87171':'#fdba74'}}>{txt}</span>;
}

  const cTotal = cart.reduce((s,i)=>s+(i.salePrice||i.price)*i.qty,0);

  const flist = (() => {

      <div style={{background:'#f9fafb',minHeight:'100vh',color:'#111',paddingBottom:80}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'18px',background:'white',borderBottom:'1px solid #f3f4f6',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
          <button onClick={()=>go('home')} style={{background:'#f3f4f6',borderRadius:'50%',padding:8}}><Ic.Back/></button>
          <span style={{color:'#f97316'}}><Ic.AdminIcon/></span>
          <h2 style={{fontSize:18,fontWeight:900}}>Админ-панель</h2>
        </div>
        <div style={{display:'flex',background:'white',borderBottom:'1px solid #f3f4f6'}}>
          {[{id:'products',l:'Товары'},{id:'auctions',l:'Аукционы'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:'12px',fontSize:14,fontWeight:700,background:'none',borderBottom:tab===t.id?'2px solid #f97316':'2px solid transparent',color:tab===t.id?'#f97316':'#9ca3af'}}>
              {t.l}
            </button>
          ))}
        </div>
        <div style={{padding:14}}>
          <div style={{background:'white',borderRadius:14,padding:18,boxShadow:'0 1px 4px rgba(0,0,0,.06)',marginBottom:18,border:'1px solid #f3f4f6'}}>
            <div style={{fontWeight:900,fontSize:15,marginBottom:14}}>{isAuc?'+ Создать аукцион':'+ Добавить товар'}</div>
            <form onSubmit={handleAdd} style={{display:'flex',flexDirection:'column',gap:10}}>
              <input type="text" placeholder="Название" style={inpLt} value={title} onChange={e=>setTitle(e.target.value)}/>
              <select value={cat} onChange={e=>setCat(e.target.value)} style={inpLt}>
                {CATS.filter(c=>c.id!=='all').map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
              <input type="number" placeholder={isAuc?'Стартовая цена (₽)':'Цена (₽)'} style={inpLt} value={price} onChange={e=>setPrice(e.target.value)}/>
              {!isAuc && <input type="number" placeholder="Цена со скидкой (опц.)" style={inpLt} value={saleP} onChange={e=>setSaleP(e.target.value)}/>}
              {isAuc  && <input type="number" placeholder="Длительность (часов)" style={inpLt} value={hours} onChange={e=>setHours(e.target.value)}/>}
              <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer',userSelect:'none'}}>
                <div onClick={()=>setIsAuc(p=>!p)}
                  style={{width:44,height:24,borderRadius:999,background:isAuc?'#9333ea':'#d1d5db',position:'relative',cursor:'pointer',flexShrink:0,transition:'background .2s'}}>
                  <div style={{position:'absolute',top:2,left:isAuc?22:2,width:20,height:20,borderRadius:'50%',background:'white',boxShadow:'0 1px 3px rgba(0,0,0,.2)',transition:'left .2s'}}/>
                </div>
                <span style={{fontSize:14,color:'#6b7280'}}>Создать как аукцион</span>
              </label>
              <button type="submit" style={{background:'#111',color:'white',borderRadius:12,padding:'12px',fontSize:14,fontWeight:700}}>
                {isAuc?'Создать аукцион':'Опубликовать'}
              </button>
            </form>
          </div>

          {tab==='products' ? (
            <div>
              <div style={{fontSize:11,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:10}}>Каталог ({prods.length})</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {prods.map(p=>(
                  <div key={p.id} style={{background:'white',borderRadius:12,padding:10,display:'flex',gap:10,alignItems:'center',border:'1px solid #f3f4f6'}}>
                    <img src={p.image} style={{width:46,height:46,borderRadius:9,objectFit:'cover',flexShrink:0}} alt=""/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.title}</div>
                      <div style={{display:'flex',gap:7,marginTop:2}}>
                        {p.onSale
                          ? <><span style={{color:'#16a34a',fontSize:12,fontWeight:700}}>{fmt(p.salePrice)} ₽</span><span style={{color:'#9ca3af',fontSize:12,textDecoration:'line-through'}}>{fmt(p.price)}</span></>
                          : <span style={{color:'#6b7280',fontSize:12}}>{fmt(p.price)} ₽</span>
                        }
                        <span style={{fontSize:10,background:'#f3f4f6',color:'#9ca3af',padding:'1px 6px',borderRadius:999}}>{p.category}</span>
                      </div>
                    </div>
                    <button onClick={()=>{setProds(prev=>prev.filter(x=>x.id!==p.id));showT('Удалено');}}
                      style={{padding:8,color:'#f87171',background:'#fef2f2',borderRadius:8}}>
                      <Ic.Trash/>
                    </button>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div>
              <div style={{fontSize:11,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:10}}>Аукционы ({aucs.length})</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {aucs.map(a=>(
                  <div key={a.id} style={{background:'white',borderRadius:12,padding:10,display:'flex',gap:10,alignItems:'center',border:'1px solid #f3f4f6'}}>
                    <img src={a.image} style={{width:46,height:46,borderRadius:9,objectFit:'cover',flexShrink:0}} alt=""/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.title}</div>
                      <div style={{display:'flex',gap:8,marginTop:2,alignItems:'center'}}>
                        <span style={{color:'#9333ea',fontSize:12,fontWeight:700}}>{fmt(a.currentBid)} ₽</span>
                        <CDot ts={a.endsAt} compact/>
                      </div>
                    </div>
                    <button onClick={()=>{setAucs(prev=>prev.filter(x=>x.id!==a.id));showT('Удалено');}}
                      style={{padding:8,color:'#f87171',background:'#fef2f2',borderRadius:8}}>
                      <Ic.Trash/>
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ---- RENDER ---- */
  const navItems = [
    {id:'home', icon:<Ic.Home/>, label:'Главная', match:['home','product','auc-detail']},
    {id:'cart', icon:<Ic.Cart/>, label:'Корзина', match:['cart'], badge:cCount},
    {id:'about',icon:<Ic.Info/>, label:'О нас',   match:['about']},
  ];
  const isAdmin = view==='admin';

  return (
    <div style={{background:'#13172A',minHeight:'100vh',maxWidth:480,margin:'0 auto',position:'relative'}}>
      {view==='home'        && <HomeView/>}
      {view==='product'     && <ProductPage/>}
      {view==='auc-detail'  && <AucPage/>}
      {view==='cart'        && <CartPage/>}
      {view==='about'       && <AboutPage/>}
      {view==='admin'       && <AdminPage/>}

      {toast.msg && (
        <div style={{
          position:'fixed',top:28,left:'50%',
          transform:'translateX(-50%)',
          background:toast.err?'#ef4444':'#22c55e',
          color:'white',padding:'10px 22px',borderRadius:999,
          fontSize:14,fontWeight:600,
          boxShadow:'0 8px 24px rgba(0,0,0,.4)',
          zIndex:9999,
          animation:'sDown .3s ease',
          whiteSpace:'nowrap'
        }}>
          {toast.msg}
        </div>
      )}

      {!isAdmin && (
        <div style={{
          position:'fixed',bottom:0,left:'50%',
          transform:'translateX(-50%)',
          width:'100%',maxWidth:480,
          background:'rgba(5,8,18,.96)',
          backdropFilter:'blur(20px)',
          borderTop:'1px solid rgba(255,255,255,.07)',
          zIndex:50
        }}>
          <div style={{display:'flex',justifyContent:'space-around',height:62,alignItems:'center',padding:'0 14px'}}>
            {navItems.map(n=>{
              const active = n.match.includes(view);
              return (
                <button key={n.id} onClick={()=>go(n.id)}
                  style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:8,position:'relative',background:'none',color:active?'#fb923c':'#4b5563',transition:'color .15s'}}>
                  {n.icon}
                  {n.badge>0 && (
                    <span style={{position:'absolute',top:4,right:2,background:'#ef4444',color:'white',fontSize:9,width:16,height:16,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900}}>
                      {n.badge>9?'9+':n.badge}
                    </span>
                  )}
                  <span style={{fontSize:10,fontWeight:500}}>{n.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
